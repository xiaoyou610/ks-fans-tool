<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官方正版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* 登录页样式 */
        #loginPage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #0a0a0a, #1a1a2e, #16213e);
            z-index: 2000;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .login-box h2 {
            margin-bottom: 30px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00ffff, #0080ff);
            border: none;
            border-radius: 5px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .login-btn:hover {
            transform: scale(1.05);
        }
        .error {
            color: #ff6b6b;
            margin-top: 10px;
            display: none;
        }
        
        /* 密码弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .modal-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        .modal-box h3 {
            color: #00ffff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .confirm-btn {
            background: linear-gradient(45deg, #00ff00, #009900);
            color: white;
        }
        .cancel-btn {
            background: linear-gradient(45deg, #ff6666, #cc0000);
            color: white;
        }
        .modal-btn:hover {
            transform: scale(1.05);
        }
        .modal-error {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 0.9em;
            display: none;
        }
        
        /* 个人介绍页样式 */
        #profilePage {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .profile-header h1 {
            color: #00ffff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }
        .profile-header p {
            color: #ccc;
            margin: 5px 0;
        }
        .ui-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .ui-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-align: center;
        }
        .ui-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 255, 0.2);
            border-color: #00ffff;
        }
        .ui-card h3 {
            color: #00ffff;
            margin-bottom: 10px;
        }
        .ui-card p {
            color: #ccc;
        }
        
        /* 游戏页样式 */
        #gamePage {
            display: none;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .game-header h2 {
            color: #ffcc00;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #ffcc00;
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .game-info div {
            text-align: center;
        }
        .game-info .label {
            color: #aaa;
            font-size: 0.9em;
        }
        .game-info .value {
            color: #00ff00;
            font-size: 1.5em;
            font-weight: bold;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            background: #111;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        /* 键盘控制区样式 */
        .keyboard-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            gap: 10px;
        }
        .key-row {
            display: flex;
            gap: 20px;
        }
        .key-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #333, #555);
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 0 #222, 0 8px 10px rgba(0,0,0,0.3);
            transition: all 0.1s;
            user-select: none;
        }
        .key-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #222, 0 5px 8px rgba(0,0,0,0.3);
        }
        .key-btn.up {
            background: linear-gradient(135deg, #00aaff, #0066cc);
        }
        .key-btn.left {
            background: linear-gradient(135deg, #ffaa00, #cc7700);
        }
        .key-btn.right {
            background: linear-gradient(135deg, #ffaa00, #cc7700);
        }
        .key-btn.space {
            width: 200px;
            font-size: 1em;
            background: linear-gradient(135deg, #00cc00, #008800);
        }
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .game-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        #startBtn {
            background: linear-gradient(45deg, #00ff00, #009900);
            color: white;
        }
        #restartBtn {
            background: linear-gradient(45deg, #ff9900, #cc6600);
            color: white;
        }
        #backBtn {
            background: linear-gradient(45deg, #ff6666, #cc0000);
            color: white;
        }
        .game-btn:hover {
            transform: scale(1.05);
        }
        .game-instruction {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            color: #ccc;
        }
        .game-instruction h4 {
            color: #ffcc00;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage">
        <div class="login-box">
            <h2>官方社区</h2>
            <div class="input-group">
                <label for="username">账号</label>
                <input type="text" id="username" placeholder="请输入账号">
            </div>
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="login-btn" onclick="login()">进入社区</button>
            <div class="error" id="errorMsg">账号或密码错误！</div>
        </div>
    </div>
    
    <!-- 密码弹窗 -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-box">
            <h3 id="modalTitle">请输入访问密码</h3>
            <div class="input-group">
                <label for="modalPassword">密码</label>
                <input type="password" id="modalPassword" placeholder="请输入访问密码">
            </div>
            <div class="modal-error" id="modalError">密码错误！</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm-btn" onclick="checkPassword()">确认</button>
            </div>
        </div>
    </div>

    <!-- 个人介绍页面 -->
    <div id="profilePage">
        <div class="profile-header">
            <h1>小y后台</h1>
            <p><strong>出生：</strong> 2009年3月1日</p>
            <p><strong>星座：</strong> 双鱼座</p>
            <p><strong>座右铭：</strong> 代码改变世界</p>
        </div>
        
        <div class="ui-cards">
            <div class="ui-card" onclick="openKuaishou()">
                <h3>快手</h3>
                <p>点击查看快手主页</p>
            </div>
            <div class="ui-card" onclick="openWeixin()">
                <h3>微信</h3>
                <p>点击查看微信</p>
            </div>
            <div class="ui-card" onclick="showGamePage()">
                <h3>个人开发</h3>
                <p>点击测试</p>
            </div>
        </div>
    </div>

    <!-- 游戏页面 -->
    <div id="gamePage">
        <div class="game-header">
            <h2>像素鸟大冒险 - 领红包</h2>
        </div>
        <div class="game-info">
            <div>
                <div class="label">当前得分</div>
                <div class="value" id="score">0</div>
            </div>
            <div>
                <div class="label">最高分</div>
                <div class="value" id="highScore">0</div>
            </div>
            <div>
                <div class="label">速度等级</div>
                <div class="value" id="speedLevel">1</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <!-- 键盘控制区 -->
        <div class="keyboard-controls">
            <div class="key-row">
                <button class="key-btn up" id="upBtn">↑</button>
            </div>
            <div class="key-row">
                <button class="key-btn left" id="leftBtn">←</button>
                <button class="key-btn right" id="rightBtn">→</button>
            </div>
            <div class="key-row">
                <button class="key-btn space" id="spaceBtn">空格键(跳跃)</button>
            </div>
        </div>
        
        <div class="game-controls">
            <button class="game-btn" id="startBtn" onclick="startGame()">开始游戏</button>
            <button class="game-btn" id="restartBtn" onclick="restartGame()" style="display:none;">重新开始</button>
            <button class="game-btn" id="backBtn" onclick="showProfilePage()">返回主页</button>
        </div>
        <div class="game-instruction">
            <h4>游戏说明</h4>
            <p><strong>目标：</strong> 控制小鸟（方块）躲避障碍，通过越多障碍得分越高。</p>
            <p><strong>操作：</strong> 使用<strong>键盘控制区</strong>或<strong>空格键</strong>让小鸟向上飞，松开则下落。</p>
            <p><strong>难度：</strong> 每得5分，游戏速度会提升一档，障碍物间隙会变小，游戏会越来越难！</p>
        </div>
    </div>

    <script>
        // 全局变量
        let currentPlatform = ''; // 当前要访问的平台
        const PASSWORD = '20090301'; // 统一密码
        
        // 登录验证函数
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username === '小y' && password === '090909') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('profilePage').style.display = 'block';
            } else {
                errorMsg.style.display = 'block';
            }
        }
        
        // 回车键登录
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
        
        // 密码弹窗相关函数
        function openKuaishou() {
            currentPlatform = 'kuaishou';
            document.getElementById('modalTitle').textContent = '访问快手 - 请输入密码';
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('modalPassword').focus();
        }
        
        function openWeixin() {
            currentPlatform = 'weixin';
            document.getElementById('modalTitle').textContent = '访问微信 - 请输入密码';
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('modalPassword').focus();
        }
        
        function closeModal() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('modalPassword').value = '';
            document.getElementById('modalError').style.display = 'none';
        }
        
        function checkPassword() {
            const inputPassword = document.getElementById('modalPassword').value;
            const modalError = document.getElementById('modalError');
            
            if (inputPassword === PASSWORD) {
                closeModal();
                if (currentPlatform === 'kuaishou') {
                    window.open('https://www.qq.com', '_blank'); // 暂时保持原链接
                } else if (currentPlatform === 'weixin') {
                    window.open('https://www.github.com', '_blank'); // 暂时保持原链接
                }
            } else {
                modalError.style.display = 'block';
                document.getElementById('modalPassword').value = '';
                document.getElementById('modalPassword').focus();
            }
        }
        
        // 回车键确认密码
        document.getElementById('modalPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
        
        // 页面切换函数
        function showGamePage() {
            document.getElementById('profilePage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';
            initGame();
        }
        
        function showProfilePage() {
            document.getElementById('gamePage').style.display = 'none';
            document.getElementById('profilePage').style.display = 'block';
        }
        
        // 游戏逻辑
        let canvas, ctx;
        let bird, obstacles = [], gameLoop;
        let score = 0, highScore = 0, gameRunning = false, gameSpeed = 2, speedLevel = 1;
        let obstacleGap = 120;
        
        function initGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // 初始化小鸟
            bird = {
                x: 100,
                y: canvas.height / 2,
                width: 30,
                height: 30,
                velocity: 0,
                gravity: 0.4,
                jumpPower: -6,
                color: '#00ffff',
                moveSpeed: 5
            };
            
            obstacles = [];
            score = 0;
            gameSpeed = 2;
            speedLevel = 1;
            obstacleGap = 120;
            updateScore();
            draw();
            
            setupKeyboardControls();
        }
        
        // 设置键盘控制按钮事件
        function setupKeyboardControls() {
            const upBtn = document.getElementById('upBtn');
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');
            const spaceBtn = document.getElementById('spaceBtn');
            
            upBtn.addEventListener('mousedown', () => jump());
            upBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                jump();
            });
            
            leftBtn.addEventListener('mousedown', () => moveLeft());
            leftBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                moveLeft();
            });
            
            rightBtn.addEventListener('mousedown', () => moveRight());
            rightBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                moveRight();
            });
            
            spaceBtn.addEventListener('mousedown', () => jump());
            spaceBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                jump();
            });
            
            [upBtn, leftBtn, rightBtn, spaceBtn].forEach(btn => {
                btn.addEventListener('mouseup', clearMove);
                btn.addEventListener('mouseleave', clearMove);
                btn.addEventListener('touchend', clearMove);
                btn.addEventListener('touchcancel', clearMove);
            });
        }
        
        function jump() {
            if (gameRunning) {
                bird.velocity = bird.jumpPower;
            }
        }
        
        function moveLeft() {
            if (gameRunning) {
                bird.x = Math.max(0, bird.x - bird.moveSpeed);
            }
        }
        
        function moveRight() {
            if (gameRunning) {
                bird.x = Math.min(canvas.width - bird.width, bird.x + bird.moveSpeed);
            }
        }
        
        function clearMove() {
            // 按钮释放后的逻辑
        }
        
        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'inline-block';
            
            addObstacle();
            gameLoop = setInterval(update, 20);
        }
        
        function restartGame() {
            clearInterval(gameLoop);
            initGame();
            startGame();
        }
        
        function addObstacle() {
            const minHeight = 50;
            const maxHeight = canvas.height - obstacleGap - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            
            obstacles.push({
                x: canvas.width,
                topHeight: topHeight,
                width: 40,
                gap: obstacleGap,
                color: '#ff9900',
                passed: false
            });
        }
        
        function update() {
            // 更新小鸟
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            
            // 边界检测
            if (bird.y <= 0) {
                bird.y = 0;
                bird.velocity = 0;
            }
            if (bird.y + bird.height >= canvas.height) {
                gameOver();
                return;
            }
            
            // 更新障碍物
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                
                // 碰撞检测
                if (bird.x < obstacles[i].x + obstacles[i].width &&
                    bird.x + bird.width > obstacles[i].x &&
                    (bird.y < obstacles[i].topHeight ||
                     bird.y + bird.height > obstacles[i].topHeight + obstacles[i].gap)) {
                    gameOver();
                    return;
                }
                
                // 计分
                if (!obstacles[i].passed && obstacles[i].x + obstacles[i].width < bird.x) {
                    obstacles[i].passed = true;
                    score++;
                    
                    // 每5分增加难度
                    if (score > 0 && score % 5 === 0) {
                        speedLevel++;
                        gameSpeed += 0.5;
                        obstacleGap = Math.max(80, obstacleGap - 5);
                        document.getElementById('speedLevel').textContent = speedLevel;
                    }
                    
                    updateScore();
                }
                
                // 移除屏幕外的障碍物
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                }
            }
            
            // 添加新障碍物
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 300) {
                addObstacle();
            }
            
            draw();
        }
        
        function draw() {
            // 清除画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制小鸟
            ctx.fillStyle = bird.color;
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            
            // 绘制小鸟眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(bird.x + 22, bird.y + 10, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + 24, bird.y + 10, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制障碍物
            obstacles.forEach(obstacle => {
                // 上部障碍
                ctx.fillStyle = obstacle.color;
                ctx.fillRect(obstacle.x, 0, obstacle.width, obstacle.topHeight);
                
                // 下部障碍
                ctx.fillRect(obstacle.x, obstacle.topHeight + obstacle.gap, 
                           obstacle.width, canvas.height - (obstacle.topHeight + obstacle.gap));
                
                // 障碍物边缘
                ctx.fillStyle = '#cc6600';
                ctx.fillRect(obstacle.x, obstacle.topHeight - 5, obstacle.width, 5);
                ctx.fillRect(obstacle.x, obstacle.topHeight + obstacle.gap, obstacle.width, 5);
            });
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            gameRunning = false;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('restartBtn').style.display = 'inline-block';
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                document.getElementById('highScore').textContent = highScore;
            }
            
            // 游戏结束动画
            ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = 'bold 30px Arial';
            ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && gameRunning) {
                jump();
                e.preventDefault();
            } else if (e.code === 'ArrowLeft' && gameRunning) {
                moveLeft();
                e.preventDefault();
            } else if (e.code === 'ArrowRight' && gameRunning) {
                moveRight();
                e.preventDefault();
            } else if (e.code === 'ArrowUp' && gameRunning) {
                jump();
                e.preventDefault();
            }
        });
        
        // 点击控制
        canvas.addEventListener('click', function() {
            if (gameRunning) {
                jump();
            }
        });
    </script>
</body>
</html>
